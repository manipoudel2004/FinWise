<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Compound Interest - FinWise</title>
</head>
<body class="bg-[#020617] text-slate-200 font-sans antialiased">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent tracking-tight">
            FinWise
        </a>
        <a href="index.html" class="text-sm font-medium text-slate-400 hover:text-white transition">
            ← Back to Dashboard
        </a>
    </nav>

    <main class="max-w-4xl mx-auto px-8 py-20">
        <div class="mb-12">
            <h1 class="text-4xl font-bold text-white mb-4">Compound Interest Calculator</h1>
            <p class="text-slate-400">See how time and consistency transform your wealth.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Initial Investment</label>
                    <input type="number" id="principal" value="10000" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-emerald-400 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Annual Return (%)</label>
                    <input type="number" id="rate" value="8" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-emerald-400 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Years to Grow</label>
                    <input type="number" id="years" value="10" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-emerald-400 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                </div>
                <button onclick="calculate()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-900/20">
                    CALCULATE GROWTH
                </button>
            </div>

            <div class="bg-slate-900/50 border border-slate-800 rounded-[2.5rem] p-10 flex flex-col items-center justify-center text-center">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500 mb-4">Future Value</span>
                <div id="result" class="text-6xl font-black text-white mb-2">$21,589</div>
                <p class="text-emerald-500/80 text-sm font-medium">Estimated Total Balance</p>
            </div>
        </div>
    </main>

    <script>
        function calculate() {
            const p = parseFloat(document.getElementById('principal').value);
            const r = parseFloat(document.getElementById('rate').value) / 100;
            const t = parseFloat(document.getElementById('years').value);
            
            const amount = p * Math.pow((1 + r), t);
            
            document.getElementById('result').innerText = `$${Math.round(amount).toLocaleString()}`;
        }
        // Run once on load
        calculate();
    </script>
</body>
</html>
