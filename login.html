<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | FinWise</title>
    <style>
        input { font-size: 16px !important; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo-svg-icon { height: 32px; width: 32px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans antialiased min-h-screen flex flex-col">

    <nav class="flex justify-between items-center px-6 md:px-8 py-6 max-w-7xl mx-auto w-full">
        <a href="index.html" class="flex items-center gap-3">
            <svg class="logo-svg-icon shrink-0" viewBox="0 0 64 64" fill="none">
                <rect width="64" height="64" rx="16" fill="url(#nav_icon_grad)" fill-opacity="0.15"/>
                <path d="M20 44V20H44M20 32H38" stroke="url(#nav_icon_grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="44" cy="20" r="4" fill="white" />
                <defs>
                    <linearGradient id="nav_icon_grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#34D399"/>
                        <stop offset="1" stop-color="#06B6D4"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent tracking-tight">FinWise</span>
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pb-20">
        <div class="w-full max-w-md">
            <div class="glass-panel rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-black text-white mb-2">Welcome Back</h1>
                    <p class="text-slate-400 text-sm">Access your portfolio and calculators.</p>
                </div>

                <form action="#" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 tracking-widest">Email Address</label>
                        <input type="email" placeholder="name@company.com" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500/50 transition-all placeholder:text-slate-700">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-bold uppercase text-slate-500 tracking-widest">Password</label>
                            <a href="#" class="text-[10px] font-bold text-emerald-500 hover:text-emerald-400 uppercase tracking-widest">Forgot?</a>
                        </div>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500/50 transition-all placeholder:text-slate-700">
                    </div>

                    <div class="pt-2">
                        <button type="submit" 
                            class="w-full bg-emerald-600 hover:bg-emerald-500 text-[#020617] font-black py-4 rounded-2xl transition-all active:scale-[0.98] shadow-lg shadow-emerald-900/20 uppercase tracking-widest text-xs">
                            Sign In
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-8 border-t border-slate-800 text-center">
                    <p class="text-slate-500 text-sm">
                        Don't have an account? 
                        <a href="signup.html" class="text-white font-bold hover:text-emerald-400 transition-colors">Sign up free</a>
                    </p>
                </div>
            </div>

            <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-widest font-bold">
                🔒 Encrypted Portfolios & Secure Auth
            </p>
        </div>
    </main>

</body>
</html>
