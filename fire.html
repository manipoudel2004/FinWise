<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FIRE Calculator - FinWise</title>
    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type=range] {
            accent-color: #10b981;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans antialiased">

    <nav class="p-6 max-w-7xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-emerald-500 font-bold text-xl flex items-center gap-2">
            <span>←</span> FinWise
        </a>
        <div class="text-slate-400 text-sm font-medium uppercase tracking-widest">FIRE Calculator</div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-8">
                <section class="glass-card rounded-3xl p-8">
                    <h2 class="text-white font-bold text-xl mb-6">Your Numbers</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Annual Expenses ($)</label>
                            <input type="number" id="expenses" value="60000" oninput="calculateFIRE()" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Current Portfolio ($)</label>
                            <input type="number" id="portfolio" value="100000" oninput="calculateFIRE()" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Monthly Contribution ($)</label>
                            <input type="number" id="monthly" value="2000" oninput="calculateFIRE()" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>

                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Withdrawal Rate (%)</label>
                                <span id="swrValue" class="text-emerald-400 font-bold">4%</span>
                            </div>
                            <input type="range" id="swr" min="2" max="6" step="0.1" value="4" oninput="calculateFIRE()" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <div class="glass-card rounded-[2rem] p-8 border-l-4 border-l-emerald-500">
                        <p class="text-slate-500 text-sm font-medium mb-1">Your FIRE Number</p>
                        <h3 id="fireNumber" class="text-4xl font-black text-white">$0</h3>
                        <p class="text-xs text-slate-500 mt-4 leading-relaxed">Based on the 25x rule for perpetual wealth.</p>
                    </div>

                    <div class="glass-card rounded-[2rem] p-8 border-l-4 border-l-cyan-500">
                        <p class="text-slate-500 text-sm font-medium mb-1">Portfolio Coverage</p>
                        <h3 id="progressPct" class="text-4xl font-black text-white">0%</h3>
                        <div class="w-full bg-slate-800 h-2 rounded-full mt-4 overflow-hidden">
                            <div id="progressBar" class="bg-cyan-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="glass-card rounded-[2rem] p-8 md:col-span-2 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <p class="text-slate-500 text-sm font-medium mb-1">Estimated Years to FIRE</p>
                            <h3 id="yearsToFire" class="text-5xl font-black text-emerald-500">0.0 Years</h3>
                        </div>
                        <div class="text-right hidden md:block">
                            <p class="text-slate-500 text-xs">Assumed Real Return</p>
                            <p class="text-white font-bold">7% (Inflation Adjusted)</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateFIRE() {
            // Get values
            const expenses = parseFloat(document.getElementById('expenses').value) || 0;
            const portfolio = parseFloat(document.getElementById('portfolio').value) || 0;
            const monthly = parseFloat(document.getElementById('monthly').value) || 0;
            const swr = parseFloat(document.getElementById('swr').value) / 100;
            
            // Update SWR label
            document.getElementById('swrValue').innerText = (swr * 100).toFixed(1) + '%';

            // 1. Calculate FIRE Number
            const fireNum = expenses / swr;
            document.getElementById('fireNumber').innerText = new Intl.NumberFormat('en-AU', { 
                style: 'currency', 
                currency: 'AUD', 
                maximumFractionDigits: 0 
            }).format(fireNum);
            
            // 2. Calculate Progress
            const progress = fireNum > 0 ? (portfolio / fireNum) * 100 : 0;
            document.getElementById('progressPct').innerText = progress.toFixed(1) + '%';
            document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';

            // 3. Time calculation using monthly compounding
            const annualReturn = 0.07; // 7% real return
            const r = annualReturn / 12;
            const m = monthly;
            let currentVal = portfolio;
            let totalMonths = 0;

            if (currentVal >= fireNum) {
                totalMonths = 0;
            } else if (m <= 0 && annualReturn <= 0) {
                totalMonths = Infinity;
            } else {
                // Loop to find month when portfolio >= fireNum
                // Limit to 600 months (50 years) to prevent infinite loops
                while (currentVal < fireNum && totalMonths < 600) {
                    currentVal = (currentVal * (1 + r)) + m;
                    totalMonths++;
                }
            }

            const years = (totalMonths / 12).toFixed(1);
            document.getElementById('yearsToFire').innerText = totalMonths >= 600 ? "50+ Years" : `${years} Years`;
        }

        // Initial Run
        calculateFIRE();
    </script>
</body>
</html>
