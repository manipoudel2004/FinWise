name = "finwise"
main = "src/index.ts"
# Keep this pinned to a known past date so CI in different timezones never treats it as a future date.
compatibility_date = "2025-12-01"

# Cloudflare Pages deploys (npx wrangler pages deploy .)
pages_build_output_dir = "."

# Cloudflare Workers deploys (npx wrangler deploy)
[assets]
directory = "."
